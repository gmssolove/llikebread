<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair — dasom's world</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#1a1018; --bg2:#241a22; --bg3:#2e2030;
  --pink:#e5a9bf; --pink-light:#fdd6dd; --pink-dim:#a06080; --pink-dark:#6b3a52;
  --text:#fdd6dd; --text-dim:#c9a0b4; --text-muted:#7a5568;
  --border:rgba(229,169,191,0.18); --border-strong:rgba(229,169,191,0.4);
}
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-weight:400; min-height:100vh; overflow-x:hidden; }

nav { position:sticky; top:0; z-index:200; background:rgba(26,16,24,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; height:52px; gap:1rem; }
.nav-back { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); text-decoration:none; transition:color 0.2s; }
.nav-back:hover { color:var(--pink); }
.nav-title { font-family:'IM Fell English',serif; font-style:italic; font-size:18px; color:var(--text); flex:1; }
.nav-links { display:flex; list-style:none; }
.nav-links li a { display:block; padding:0 1rem; height:52px; line-height:52px; font-size:10px; letter-spacing:0.16em; color:var(--text-muted); text-decoration:none; transition:color 0.2s; text-transform:uppercase; }
.nav-links li.active a { color:var(--pink); border-bottom:2px solid var(--pink); }

.main-content { padding:2.5rem 2rem; max-width:1100px; margin:0 auto; }

/* PAIR GRID */
.pair-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:24px; }

/* PAIR CARD */
.pair-card {
  cursor:pointer;
  transition:transform 0.25s;
  position:relative;
}
.pair-card:hover { transform:translateY(-6px); }

/* TWO CHARS SIDE BY SIDE */
.pair-card-imgs {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  height:340px;
  position:relative;
  overflow:hidden;
  border:1px solid var(--border);
  transition:border-color 0.25s;
}
.pair-card:hover .pair-card-imgs { border-color:var(--pink); }

.pair-char-wrap {
  position:relative;
  overflow:hidden;
  background:var(--bg3);
}

.pair-char-img { width:100%; height:100%; object-fit:cover; object-position:top; transition:filter 0.35s, opacity 0.35s; }
.pair-char-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'IM Fell English',serif; font-style:italic; font-size:48px; color:rgba(229,169,191,0.07); transition:filter 0.35s; }

/* HOVER: 흐려지면서 이름 표시 */
.pair-char-hover { position:absolute; inset:0; background:rgba(26,16,24,0.7); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s; flex-direction:column; gap:4px; }
.pair-card:hover .pair-char-hover { opacity:1; }
.pair-card:hover .pair-char-img { filter:blur(2px); opacity:0.35; }
.pair-card:hover .pair-char-placeholder { filter:blur(2px); opacity:0.25; }
.pair-char-hover-name { font-family:'IM Fell English',serif; font-style:italic; font-size:16px; color:var(--text); letter-spacing:0.04em; text-align:center; padding:0 6px; }
.pair-char-hover-sub { font-size:9px; color:var(--pink-dim); letter-spacing:0.1em; text-transform:uppercase; }

/* CENTER DIVIDER */
.pair-center-line { position:absolute; top:0; bottom:0; left:50%; transform:translateX(-50%); width:1px; background:var(--border); z-index:2; }
.pair-center-symbol { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3; background:var(--bg2); border:1px solid var(--border); width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; color:var(--pink-dim); transition:all 0.25s; }
.pair-card:hover .pair-center-symbol { border-color:var(--pink); color:var(--pink); }

/* BOTTOM INFO */
.pair-card-bottom {
  background:var(--bg2);
  border:1px solid var(--border);
  border-top:none;
  padding:14px 16px;
  transition:border-color 0.25s;
}
.pair-card:hover .pair-card-bottom { border-color:var(--pink); }
.pair-card-names { font-family:'IM Fell English',serif; font-style:italic; font-size:17px; color:var(--text); letter-spacing:0.03em; margin-bottom:4px; }
.pair-card-names span { color:var(--pink); margin:0 6px; }
.pair-card-rel { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); font-family:'Cormorant Garamond',serif; font-style:italic; }
.pair-card-keywords { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.pair-card-keyword { padding:2px 8px; background:rgba(160,96,128,0.08); border:1px solid var(--border); font-size:9px; color:var(--text-muted); letter-spacing:0.06em; font-family:'Cormorant Garamond',serif; font-style:italic; }

/* DETAIL MODAL */
#detail-modal { display:none; position:fixed; inset:0; z-index:500; background:rgba(10,6,8,0.85); backdrop-filter:blur(8px); align-items:center; justify-content:center; padding:2rem; }
#detail-modal.active { display:flex; }
.detail-box { background:var(--bg2); border:1px solid var(--border); max-width:760px; width:100%; max-height:88vh; overflow:hidden; display:flex; flex-direction:column; position:relative; }
.detail-close { position:absolute; top:1rem; right:1rem; background:transparent; border:1px solid var(--border); color:var(--text-muted); cursor:pointer; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-size:12px; z-index:10; transition:all 0.2s; }
.detail-close:hover { border-color:var(--pink-dim); color:var(--pink); }

.detail-top { display:grid; grid-template-columns:1fr 1fr; height:280px; border-bottom:1px solid var(--border); }
.detail-top-char { position:relative; overflow:hidden; }
.detail-top-char img { width:100%; height:100%; object-fit:cover; object-position:top; }
.detail-top-char-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'IM Fell English',serif; font-style:italic; font-size:64px; color:rgba(229,169,191,0.06); background:var(--bg3); }
.detail-top-char-gradient { position:absolute; inset:0; background:linear-gradient(to top, var(--bg2) 0%, transparent 40%); }
.detail-top-char-name { position:absolute; bottom:1rem; left:0; right:0; text-align:center; font-family:'IM Fell English',serif; font-style:italic; font-size:16px; color:var(--text); letter-spacing:0.04em; }
.detail-top-char-divider { position:absolute; top:0; bottom:0; left:50%; width:1px; background:var(--border); z-index:2; pointer-events:none; }

.detail-body { flex:1; overflow-y:auto; padding:1.75rem; }
.detail-body::-webkit-scrollbar { width:3px; }
.detail-body::-webkit-scrollbar-thumb { background:var(--pink-dark); }
.detail-pair-title { font-family:'IM Fell English',serif; font-style:italic; font-size:22px; color:var(--text); margin-bottom:4px; }
.detail-pair-title span { color:var(--pink); }
.detail-rel-badge { display:inline-block; padding:3px 12px; border:1px solid var(--pink-dark); font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--pink-dim); font-family:'Cormorant Garamond',serif; font-style:italic; margin-bottom:1.25rem; }
.detail-section-title { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--pink-dim); margin-bottom:0.6rem; margin-top:1.25rem; font-family:'Cormorant Garamond',serif; font-style:italic; }
.detail-desc { font-size:12px; color:var(--text-dim); line-height:1.9; }
.detail-keywords { display:flex; flex-wrap:wrap; gap:6px; }
.detail-keyword { padding:3px 12px; background:rgba(160,96,128,0.08); border:1px solid var(--border); font-size:10px; color:var(--text-muted); letter-spacing:0.08em; font-family:'Cormorant Garamond',serif; font-style:italic; }

/* BGM */
#bgm-player { position:fixed; bottom:1.5rem; right:1.5rem; z-index:999; background:rgba(26,16,24,0.96); border:1px solid var(--border); backdrop-filter:blur(12px); display:flex; align-items:center; gap:10px; padding:10px 14px; min-width:220px; max-width:300px; transition:all 0.3s; }
#bgm-player.collapsed { min-width:0; max-width:none; width:44px; height:44px; padding:0; justify-content:center; }
#bgm-player.collapsed #bgm-info,#bgm-player.collapsed #bgm-vol-wrap,#bgm-player.collapsed #bgm-toggle-collapse,#bgm-player.collapsed #bgm-play-btn { display:none; }
#bgm-play-btn { width:28px; height:28px; flex-shrink:0; background:transparent; border:1px solid var(--pink-dim); color:var(--pink); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; }
#bgm-info { flex:1; min-width:0; }
#bgm-title { font-size:10px; color:var(--text-dim); letter-spacing:0.06em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#bgm-artist { font-size:9px; color:var(--text-muted); margin-top:2px; }
#bgm-vol-wrap { display:flex; align-items:center; }
#bgm-vol { width:55px; accent-color:var(--pink); cursor:pointer; }
#bgm-toggle-collapse { background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:11px; padding:2px 4px; flex-shrink:0; }
#bgm-expand-btn { display:none; background:transparent; border:none; color:var(--pink); cursor:pointer; font-size:14px; width:100%; height:100%; align-items:center; justify-content:center; }
#bgm-player.collapsed #bgm-expand-btn { display:flex; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">← back</a>
  <div class="nav-title">Pair — Relationships</div>
  <ul class="nav-links">
    <li><a href="oc.html">OC</a></li>
    <li class="active"><a href="pair.html">Pair</a></li>
  </ul>
</nav>

<div class="main-content">
  <div class="pair-grid" id="pair-grid"></div>
</div>

<!-- DETAIL MODAL -->
<div id="detail-modal">
  <div class="detail-box">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-top" id="detail-top"></div>
    <div class="detail-body">
      <div class="detail-pair-title" id="detail-names">— <span>&</span> —</div>
      <div class="detail-rel-badge" id="detail-rel">—</div>
      <div class="detail-section-title">About</div>
      <div class="detail-desc" id="detail-desc">—</div>
      <div class="detail-section-title">Keywords</div>
      <div class="detail-keywords" id="detail-keywords"></div>
      <div class="detail-section-title">Story</div>
      <div class="detail-desc" id="detail-story" style="white-space:pre-wrap;">—</div>
    </div>
  </div>
</div>

<div id="bgm-player">
  <button id="bgm-play-btn">▶</button>
  <div id="bgm-info"><div id="bgm-title">BGM</div><div id="bgm-artist"></div></div>
  <div id="bgm-vol-wrap"><input type="range" id="bgm-vol" min="0" max="100" value="70"></div>
  <button id="bgm-toggle-collapse">✕</button>
  <button id="bgm-expand-btn">♪</button>
</div>
<div id="yt-container" style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;"></div>

<script>
var defaultPairs = [
  {id:'yundan-negai',chars:['윤단','願'],charImgs:['',''],charSubs:['Yundan','Negai'],relation:'Silent Bond',desc:'말하지 않아도 곁에 있는 것. 건조한 말투와 조용한 존재감.',keywords:['침묵','동행','신뢰','말없는 이해'],story:'',color:'#e5a9bf'},
  {id:'uru-toya',chars:['遠藤 潤','遠藤 斗哉'],charImgs:['',''],charSubs:['Uru','Toya'],relation:'Antagonist × Protagonist',desc:'키사라기 고교의 생도회장과 전학생.',keywords:['대립','비밀','학교'],story:'',color:'#c0392b'},
  {id:'iori-toya',chars:['遠藤 伊織','遠藤 斗哉'],charImgs:['',''],charSubs:['Iori','Toya'],relation:'Founder × Descendant',desc:'창립자와 그 후계자.',keywords:['혈연','봉인','운명'],story:'',color:'#9a7d4a'}
];

function getPairs(){ try{return JSON.parse(localStorage.getItem('oc_pairs'))||defaultPairs;}catch(e){return defaultPairs;} }

function renderGrid(){
  var pairs=getPairs();
  var grid=document.getElementById('pair-grid');
  grid.innerHTML='';
  pairs.forEach(function(p){
    var card=document.createElement('div');
    card.className='pair-card';
    card.onclick=function(){openDetail(p);};

    var charImgsHtml=p.chars.map(function(name,i){
      var img=p.charImgs&&p.charImgs[i];
      var sub=p.charSubs&&p.charSubs[i]||'';
      return '<div class="pair-char-wrap">'
        +(img?'<img class="pair-char-img" src="'+img+'" alt="'+name+'">':'<div class="pair-char-placeholder">'+name[0]+'</div>')
        +'<div class="pair-char-hover"><div class="pair-char-hover-name">'+name+'</div>'+(sub?'<div class="pair-char-hover-sub">'+sub+'</div>':'')+'</div>'
        +'</div>';
    }).join('');

    var kwHtml=(p.keywords||[]).slice(0,3).map(function(k){return'<div class="pair-card-keyword">'+k+'</div>';}).join('');

    card.innerHTML='<div class="pair-card-imgs">'
      +charImgsHtml
      +'<div class="pair-center-line"></div>'
      +'<div class="pair-center-symbol">&</div>'
      +'</div>'
      +'<div class="pair-card-bottom">'
      +'<div class="pair-card-names">'+p.chars[0]+' <span>&</span> '+p.chars[1]+'</div>'
      +'<div class="pair-card-rel">'+p.relation+'</div>'
      +'<div class="pair-card-keywords">'+kwHtml+'</div>'
      +'</div>';
    grid.appendChild(card);
  });
}

function openDetail(p){
  document.getElementById('detail-names').innerHTML=p.chars[0]+' <span>&</span> '+p.chars[1];
  document.getElementById('detail-rel').textContent=p.relation||'—';
  document.getElementById('detail-desc').textContent=p.desc||'—';
  document.getElementById('detail-story').textContent=p.story||'—';
  var kw=document.getElementById('detail-keywords');
  kw.innerHTML=(p.keywords||[]).map(function(k){return'<div class="detail-keyword">'+k+'</div>';}).join('');

  var top=document.getElementById('detail-top');
  top.innerHTML=p.chars.map(function(name,i){
    var img=p.charImgs&&p.charImgs[i];
    return '<div class="detail-top-char">'
      +(img?'<img src="'+img+'" alt="'+name+'">':'<div class="detail-top-char-placeholder">'+name[0]+'</div>')
      +'<div class="detail-top-char-gradient"></div>'
      +'<div class="detail-top-char-name">'+name+'</div>'
      +'</div>';
  }).join('')+'<div class="detail-top-char-divider"></div>';

  document.getElementById('detail-modal').classList.add('active');
}
function closeDetail(){ document.getElementById('detail-modal').classList.remove('active'); }
document.getElementById('detail-modal').addEventListener('click',function(e){if(e.target===this)closeDetail();});

// BGM
var bgmData=JSON.parse(localStorage.getItem('kisaragi_bgm')||'{"title":"BGM","artist":"","youtubeId":""}');
document.getElementById('bgm-title').textContent=bgmData.title||'BGM';
document.getElementById('bgm-artist').textContent=bgmData.artist||'';
window._bgmYtId=bgmData.youtubeId||'';
var ytPlayer=null,isPlaying=false;
document.getElementById('bgm-play-btn').addEventListener('click',function(){
  if(!window._bgmYtId)return;
  if(!ytPlayer){document.getElementById('yt-container').innerHTML='<div id="yt-iframe"></div>';var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);window.onYouTubeIframeAPIReady=function(){ytPlayer=new YT.Player('yt-iframe',{height:'1',width:'1',videoId:window._bgmYtId,playerVars:{autoplay:1,loop:1,playlist:window._bgmYtId},events:{onReady:function(e){e.target.setVolume(document.getElementById('bgm-vol').value);}}});};isPlaying=true;this.textContent='⏸';return;}
  if(isPlaying){ytPlayer.pauseVideo();isPlaying=false;this.textContent='▶';}else{ytPlayer.playVideo();isPlaying=true;this.textContent='⏸';}
});
document.getElementById('bgm-vol').addEventListener('input',function(){if(ytPlayer)ytPlayer.setVolume(this.value);});
document.getElementById('bgm-toggle-collapse').addEventListener('click',function(){document.getElementById('bgm-player').classList.add('collapsed');});
document.getElementById('bgm-expand-btn').addEventListener('click',function(){document.getElementById('bgm-player').classList.remove('collapsed');});

renderGrid();
</script>
</body>
</html>
