<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OC — lakehouse</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#c49a6c;--gold-light:#e8c99a;--gold-dim:#8a6a45;--gold-dark:#5a4228;
  --pink:var(--gold);--pink-light:var(--gold-light);--pink-dim:var(--gold-dim);--pink-dark:var(--gold-dark);

  --bg:#151210;--bg2:#1d1814;--bg3:#252018;
  --gold-real:#c49a6c;
  --text:#e8ddd0;--text-dim:#b8a898;--text-muted:#7a6a58;
  --border:rgba(196,154,108,0.18);--border-strong:rgba(196,154,108,0.45);
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden;}

nav{position:sticky;top:0;z-index:200;background:rgba(26,16,24,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;height:52px;gap:1rem;}
.nav-back{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;transition:color .2s;}
.nav-back:hover{color:var(--pink);}
.nav-title{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--text);flex:1;}
.nav-links{display:flex;list-style:none;}
.nav-links li a{display:block;padding:0 1rem;height:52px;line-height:52px;font-size:10px;letter-spacing:.16em;color:var(--text-muted);text-decoration:none;text-transform:uppercase;}
.nav-links li.active a{color:var(--pink);border-bottom:2px solid var(--pink);}

/* LIST */
.layout{display:flex;height:calc(100vh - 52px);overflow:hidden;}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.25rem 1rem;gap:1rem;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--pink-dark);}
.s-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--pink-dim);margin-bottom:.5rem;font-family:'Cormorant Garamond',serif;font-style:italic;}
.search-input{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;outline:none;}
.search-input:focus{border-color:var(--pink-dim);}
.search-input::placeholder{color:var(--text-muted);}
.filter-group{display:flex;flex-direction:column;gap:3px;}
.filter-btn{padding:6px 10px;font-size:11px;background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all .2s;font-family:inherit;text-align:left;display:flex;align-items:center;gap:8px;}
.filter-btn::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background .2s;}
.filter-btn.active,.filter-btn:hover{border-color:var(--pink-dim);color:var(--pink);}
.filter-btn.active::before{background:var(--pink);}
.sidebar-count{font-size:11px;color:var(--text-muted);padding-top:.5rem;border-top:1px solid var(--border);}
.main-content{flex:1;overflow-y:auto;padding:1.75rem;}
.main-content::-webkit-scrollbar{width:4px;}
.main-content::-webkit-scrollbar-thumb{background:var(--pink-dark);}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}

/* CARDS */
.char-card{aspect-ratio:2/3;background:var(--bg3);border:1px solid var(--border);position:relative;overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s;}
.char-card:hover{border-color:var(--pink);transform:translateY(-5px);}
.char-card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;transition:filter .3s,opacity .3s;}
.char-card-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-size:64px;color:rgba(196,154,108,.07);transition:filter .3s;}
.char-card-hover{position:absolute;inset:0;background:rgba(26,16,24,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;gap:6px;z-index:2;}
.char-card:hover .char-card-hover{opacity:1;}
.char-card:hover .char-card-img{filter:blur(2px);opacity:.35;}
.char-card:hover .char-card-placeholder{filter:blur(2px);opacity:.3;}
.hover-name{font-family:'Playfair Display',serif;font-style:italic;font-size:20px;color:var(--text);text-align:center;padding:0 12px;}
.hover-sub{font-size:10px;color:var(--pink-dim);letter-spacing:.12em;text-transform:uppercase;}
.hover-tag{padding:3px 10px;border:1px solid var(--pink-dark);font-size:9px;color:var(--pink-dim);font-family:'Cormorant Garamond',serif;font-style:italic;}
.char-card-bottom{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(to top,rgba(26,16,24,.97) 0%,transparent 100%);z-index:1;}
.char-card-stars{font-size:8px;color:var(--pink-dim);letter-spacing:1px;margin-bottom:2px;}
.char-card-name{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:500;color:var(--text);}
.char-card-role{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;}

/* ===== GAME UI DETAIL ===== */
#detail-screen{display:none;position:fixed;inset:0;z-index:400;background:var(--bg);overflow:hidden;}
#detail-screen.active{display:flex;flex-direction:column;}

.game-topbar{display:flex;align-items:center;gap:1rem;padding:0 1.5rem;height:48px;flex-shrink:0;background:rgba(26,16,24,.97);border-bottom:1px solid var(--border);position:relative;z-index:10;}
.game-back{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);background:transparent;border:1px solid var(--border);cursor:pointer;font-family:inherit;padding:4px 14px;transition:all .2s;}
.game-back:hover{border-color:var(--pink-dim);color:var(--pink);}
.game-topbar-title{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:var(--text-dim);flex:1;}
.game-topbar-id{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--text-muted);letter-spacing:.1em;}
.btn-edit{padding:5px 16px;background:transparent;border:1px solid var(--pink-dim);color:var(--pink-dim);font-family:inherit;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-edit:hover{background:rgba(130,106,69,.15);color:var(--pink);}

.game-body{flex:1;display:grid;grid-template-columns:1fr 420px;overflow:hidden;}

/* LEFT */
.game-left{position:relative;overflow:hidden;background:var(--bg2);}
.game-char-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(130,106,69,.15) 0%,transparent 65%);}
.game-char-img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:90%;width:auto;max-width:100%;object-fit:contain;object-position:bottom;}
.game-char-img.animate-in{animation:charSlideIn .6s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes charSlideIn{from{opacity:0;transform:translateX(calc(-50% - 40px));}to{opacity:1;transform:translateX(-50%);}}
.game-char-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-size:200px;color:rgba(196,154,108,.04);}
.game-char-gradient{position:absolute;inset:0;background:linear-gradient(to right,rgba(26,16,24,.05) 0%,transparent 50%,rgba(26,16,24,.6) 100%),linear-gradient(to top,rgba(26,16,24,1) 0%,transparent 25%);}
.game-corner{position:absolute;width:36px;height:36px;opacity:.35;}
.game-corner-tl{top:14px;left:14px;border-top:1px solid var(--pink-dim);border-left:1px solid var(--pink-dim);}
.game-corner-tr{top:14px;right:14px;border-top:1px solid var(--pink-dim);border-right:1px solid var(--pink-dim);}
.game-corner-bl{bottom:14px;left:14px;border-bottom:1px solid var(--pink-dim);border-left:1px solid var(--pink-dim);}
.game-corner-br{bottom:14px;right:14px;border-bottom:1px solid var(--pink-dim);border-right:1px solid var(--pink-dim);}
.game-left::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(196,154,108,.012) 3px,rgba(196,154,108,.012) 4px);pointer-events:none;z-index:1;}

/* AU BUTTONS */
.au-buttons{position:absolute;bottom:1.5rem;right:1.5rem;z-index:5;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.au-btn{padding:4px 12px;background:rgba(26,16,24,.85);border:1px solid var(--border);font-size:10px;letter-spacing:.1em;color:var(--text-muted);cursor:pointer;transition:all .2s;font-family:'Cormorant Garamond',serif;font-style:italic;backdrop-filter:blur(8px);}
.au-btn:hover,.au-btn.active{border-color:var(--pink-dim);color:var(--pink);}

/* THEME PLAYER */
.theme-player{position:absolute;top:1rem;right:1rem;z-index:5;background:rgba(26,16,24,.88);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px;padding:7px 14px;max-width:200px;}
.theme-play-btn{width:24px;height:24px;background:transparent;border:1px solid var(--pink-dim);border-radius:50%;color:var(--pink);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.theme-play-btn:hover{background:rgba(130,106,69,.2);}
.theme-info{min-width:0;flex:1;}
.theme-title{font-size:9px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.05em;}
.theme-artist{font-size:8px;color:var(--text-muted);margin-top:1px;}

/* RIGHT PANEL */
.game-right{background:rgba(36,26,34,.97);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.game-file-header{padding:1.25rem 1.5rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.game-file-label{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.3rem;}
.game-file-id{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--pink-dim);letter-spacing:.1em;margin-bottom:.6rem;}
.game-role-badge{display:inline-block;padding:3px 12px;border:1px solid var(--pink-dark);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--pink-dim);font-family:'Cormorant Garamond',serif;font-style:italic;}

/* INFO animate */
.game-info-block{opacity:0;transform:translateX(20px);transition:opacity .4s,transform .4s;}
.game-info-block.visible{opacity:1;transform:translateX(0);}

.game-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.game-tab{padding:9px 14px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500;}
.game-tab.active{color:var(--pink);border-bottom-color:var(--pink);}
.game-tab-content{display:none;flex:1;overflow-y:auto;padding:1.25rem 1.5rem;}
.game-tab-content::-webkit-scrollbar{width:3px;}
.game-tab-content::-webkit-scrollbar-thumb{background:var(--pink-dark);}
.game-tab-content.active{display:block;}

.game-char-name-block{margin-bottom:1.25rem;}
.game-char-name{font-family:'Playfair Display',serif;font-size:32px;font-style:italic;color:var(--text);line-height:1.1;margin-bottom:4px;}
.game-char-sub{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--text-muted);letter-spacing:.12em;}
.game-char-stars{font-size:11px;color:var(--pink-dim);letter-spacing:2px;margin-bottom:.5rem;}
.game-section-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--pink-dim);margin-bottom:.5rem;margin-top:1rem;font-family:'Cormorant Garamond',serif;font-style:italic;}
.game-section-label:first-child{margin-top:0;}
.game-profile-table{width:100%;border-collapse:collapse;}
.game-profile-table tr{border-bottom:1px solid rgba(196,154,108,.07);}
.game-profile-table tr:last-child{border-bottom:none;}
.game-profile-table td{padding:7px 0;font-size:12px;}
.game-profile-table td:first-child{color:var(--text-muted);width:40%;}
.game-profile-table td:last-child{color:var(--text-dim);}
.game-desc{font-size:12px;color:var(--text-dim);line-height:1.9;margin-top:.75rem;}
.game-gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.game-gallery-item{aspect-ratio:3/4;background:var(--bg3);border:1px solid var(--border);overflow:hidden;}
.game-gallery-item img{width:100%;height:100%;object-fit:cover;}
.game-novel-item{padding:10px 0;border-bottom:1px solid rgba(196,154,108,.07);}
.game-novel-item:last-child{border-bottom:none;}
.game-novel-title{font-size:13px;color:var(--text);margin-bottom:3px;}
.game-novel-preview{font-size:11px;color:var(--text-muted);line-height:1.7;}
.empty-msg{font-size:12px;color:var(--text-muted);text-align:center;padding:2rem;}

/* EDIT PANEL */
#edit-panel{display:none;position:fixed;top:0;right:0;bottom:0;width:420px;z-index:600;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:1.5rem;box-shadow:-4px 0 24px rgba(0,0,0,.5);}
#edit-panel.active{display:block;}
#edit-panel::-webkit-scrollbar{width:3px;}
#edit-panel::-webkit-scrollbar-thumb{background:var(--pink-dark);}
.ep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.ep-title{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--pink-light);}
.ep-close{background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;}
.ep-close:hover{border-color:var(--pink-dim);color:var(--pink);}
.form-group{margin-bottom:.9rem;}
.form-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;display:block;}
.form-input{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;outline:none;resize:vertical;}
.form-input:focus{border-color:var(--pink-dim);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-save{padding:8px 20px;background:rgba(130,106,69,.2);border:1px solid var(--pink-dim);color:var(--pink);font-family:inherit;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:rgba(130,106,69,.35);}
.btn-del{padding:7px 14px;background:transparent;border:1px solid rgba(139,26,26,.4);color:rgba(192,57,43,.7);font-family:inherit;font-size:10px;cursor:pointer;}
.save-msg{font-size:11px;color:var(--pink);margin-top:8px;display:none;}
.section-sep{border-top:1px solid var(--border);margin:1.25rem 0;padding-top:1.25rem;}
.section-sep-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--pink-dim);margin-bottom:.75rem;font-family:'Cormorant Garamond',serif;font-style:italic;}
.img-upload-wrap{display:flex;flex-direction:column;gap:6px;}
.img-preview{width:100%;aspect-ratio:2/3;background:var(--bg3);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted);}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-size-controls{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.file-input-label{display:block;padding:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text-muted);font-size:11px;letter-spacing:.1em;text-align:center;cursor:pointer;transition:all .2s;}
.file-input-label:hover{border-color:var(--pink-dim);color:var(--pink);}
input[type=file]{display:none;}
.profile-drag-list{display:flex;flex-direction:column;gap:4px;}
.profile-drag-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);cursor:grab;}
.profile-drag-item:active{cursor:grabbing;opacity:.7;}
.drag-handle{color:var(--text-muted);font-size:14px;cursor:grab;flex-shrink:0;user-select:none;}
.drag-over{border-color:var(--pink-dim);background:rgba(130,106,69,.08);}
.vn-row{background:var(--bg3);border:1px solid var(--border);padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px;}
/* AU edit */
.au-edit-item{display:flex;gap:6px;margin-bottom:8px;background:var(--bg3);border:1px solid var(--border);padding:10px;flex-direction:column;}

/* BGM */
#bgm-player{position:fixed;bottom:2rem;right:2rem;z-index:999;background:rgba(26,16,24,.97);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(16px);display:flex;align-items:center;gap:12px;padding:14px 18px;min-width:260px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.4);transition:min-width .3s,max-width .3s,padding .3s,border-radius .3s;cursor:move;user-select:none;}
#bgm-player.collapsed{min-width:0;max-width:none;width:52px;height:52px;padding:0;border-radius:50%;justify-content:center;}
#bgm-player.collapsed #bgm-info,#bgm-player.collapsed #bgm-vol-wrap,#bgm-player.collapsed #bgm-toggle-collapse,#bgm-player.collapsed #bgm-play-btn{display:none;}
#bgm-play-btn{width:34px;height:34px;flex-shrink:0;background:transparent;border:1px solid var(--pink-dim);border-radius:50%;color:var(--pink);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
#bgm-play-btn:hover{background:rgba(130,106,69,.2);}
#bgm-info{flex:1;min-width:0;}
#bgm-title{font-size:11px;color:var(--text-dim);letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#bgm-artist{font-size:10px;color:var(--text-muted);margin-top:2px;}
#bgm-vol-wrap{display:flex;align-items:center;}
#bgm-vol{width:60px;accent-color:var(--pink);cursor:pointer;}
#bgm-toggle-collapse{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:2px 4px;flex-shrink:0;transition:color .2s;}
#bgm-toggle-collapse:hover{color:var(--pink);}
#bgm-expand-btn{display:none;background:transparent;border:none;color:var(--pink);cursor:pointer;font-size:16px;width:100%;height:100%;align-items:center;justify-content:center;}
#bgm-player.collapsed #bgm-expand-btn{display:flex;}
</style>
<style id="lakehouse-codex-css">
:root{--lake-ink:#0b0d0c;--lake-panel:rgba(16,18,16,.86);--lake-panel-2:rgba(29,31,28,.78);--lake-copper:#d7a982;--lake-copper-soft:#f0cfad;--lake-copper-deep:#9f7358;--lake-mist:#d8d5cb;--lake-muted:rgba(216,213,203,.58);--lake-line:rgba(215,169,130,.42);--lake-line-soft:rgba(215,169,130,.18);--lake-green:#7e8a7c;--lake-rose:#b98375}

        .then(function(){console.log('[Firebase] oc_characters 저장 성공');})
        .catch(function(e){console.error('[Firebase] oc_characters 저장 실패:', e);});
    } else if(_retry<50){
      _retry++;
      setTimeout(_write,100);
    } else {
      console.error('[Firebase] _db 초기화 실패 - 로그인 상태 확인 필요');
    }
  })();
}
function getCats(){try{return JSON.parse(localStorage.getItem('oc_categories'))||defaultCats;}catch(e){return defaultCats;}}

var activeCat='all',activeSub='all',currentChar=null,currentAuIdx=-1,epGalleryData=[],dragSrcIndex=null;
var themePlayer=null,themeIsPlaying=false;

function renderCategoryFilters(){
  var cats=getCats(),wrap=document.getElementById('category-filters');

function setFilter(type,val,btn){
  if(type==='cat'){activeCat=val;activeSub='all';document.querySelectorAll('#category-filters .filter-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');updateSubFilters();}
  else{activeSub=val;document.querySelectorAll('#sub-filters .filter-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');}

function updateSubFilters(){
  var chars=getChars(),wrap=document.getElementById('sub-filter-wrap'),group=document.getElementById('sub-filters');
  if(activeCat==='all'){wrap.style.display='none';return;}
  var subs=[...new Set(chars.filter(function(c){return c.category===activeCat;}).map(function(c){return c.subcat;}).filter(Boolean))];
  if(!subs.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  document.getElementById('sub-filter-title').textContent=activeCat==='세계관'?'Universe':'Scenario';
  group.innerHTML='<button class="filter-btn active" onclick="setFilter(\'sub\',\'all\',this)">전체</button>';
  subs.forEach(function(s){group.innerHTML+='<button class="filter-btn" onclick="setFilter(\'sub\',\''+s+'\',this)">'+s+'</button>';});
}
function renderGrid(){
  var chars=getChars(),search=document.getElementById('search-input').value.toLowerCase();
  var filtered=chars.filter(function(c){
    if(activeCat!=='all'&&c.category!==activeCat)return false;
    if(activeSub!=='all'&&c.subcat!==activeSub)return false;
    if(search&&!c.name.toLowerCase().includes(search)&&!(c.nameSub||'').toLowerCase().includes(search))return false;
    return true;
  });
  document.getElementById('char-count').textContent=filtered.length+'개';
  var grid=document.getElementById('card-grid'),romans=['I','II','III','IV','V','VI','VII','VIII','IX','X'];

  filtered.forEach(function(c,i){

    card.onclick=function(){openDetail(c,-1);};

      +'<div class="char-card-hover"><div class="hover-name">'+c.name+'</div>'+(c.nameSub?'<div class="hover-sub">'+c.nameSub+'</div>':'')+(c.tag?'<div class="hover-tag">'+c.tag+'</div>':'')+'</div>'
      +'<div class="char-card-bottom"><div class="char-card-stars">'+stars+'</div><div class="char-card-name">'+c.name+'</div><div class="char-card-role">'+c.role+'</div></div>';

function openDetail(c,auIdx){

  var nl=document.getElementById('game-novel');

    document.getElementById('theme-player').style.display='flex';

    document.getElementById('theme-artist').textContent=theme.artist||'';

  });

  document.getElementById('btn-edit').style.display=window._isAdmin?'block':'none';
  switchTab('info',document.querySelector('.game-tab'));
  document.getElementById('detail-screen').classList.add('active');
}

// THEME SONG
window._themeYtId='';
window._themeFileData='';
window._themeAudio=null;
function toggleTheme(){
  // 파일 기반 테마
  if(window._themeFileData){
    if(!window._themeAudio){
      window._themeAudio=new Audio(window._themeFileData);
      window._themeAudio.loop=true;
      window._themeAudio.volume=0.8;
    }
    if(themeIsPlaying){window._themeAudio.pause();themeIsPlaying=false;document.getElementById('theme-play-btn').textContent='▶';}
    else{window._themeAudio.play();themeIsPlaying=true;document.getElementById('theme-play-btn').textContent='⏸';}
    return;
  }
  if(!window._themeYtId)return;
  if(!themePlayer){
    document.getElementById('theme-yt-container').innerHTML='<div id="theme-yt-iframe"></div>';
    var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';
    s.onload=function(){};
    // check if already loaded
    if(window.YT&&window.YT.Player){
      themePlayer=new YT.Player('theme-yt-iframe',{height:'1',width:'1',videoId:window._themeYtId,playerVars:{autoplay:1,loop:1,playlist:window._themeYtId},events:{onReady:function(e){e.target.setVolume(80);}}});
    } else {
      var prevReady=window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady=function(){
        if(prevReady) prevReady();
        themePlayer=new YT.Player('theme-yt-iframe',{height:'1',width:'1',videoId:window._themeYtId,playerVars:{autoplay:1,loop:1,playlist:window._themeYtId},events:{onReady:function(e){e.target.setVolume(80);}}});
      };
      document.head.appendChild(s);
    }
    themeIsPlaying=true;document.getElementById('theme-play-btn').textContent='⏸';return;
  }
  if(themeIsPlaying){themePlayer.pauseVideo();themeIsPlaying=false;document.getElementById('theme-play-btn').textContent='▶';}
  else{themePlayer.playVideo();themeIsPlaying=true;document.getElementById('theme-play-btn').textContent='⏸';}
}
function stopTheme(){
  if(themePlayer){try{themePlayer.stopVideo();}catch(e){}}
  themePlayer=null;
  if(window._themeAudio){window._themeAudio.pause();window._themeAudio=null;}
  themeIsPlaying=false;
  document.getElementById('theme-yt-container').innerHTML='';
}

function renderProfileRows(profile){document.getElementById('ep-profile-rows').innerHTML='';profile.forEach(function(p){addProfileRowWithVal(p.k,p.v);});}
function addProfileRow(){addProfileRowWithVal('','');}
function addProfileRowWithVal(k,v){
  var container=document.getElementById('ep-profile-rows');
  var item=document.createElement('div');item.className='profile-drag-item';item.draggable=true;
  item.innerHTML='<span class="drag-handle">⠿</span><input class="form-input prof-key" placeholder="항목명" value="'+k+'" style="flex:1;padding:4px 6px;"><input class="form-input prof-val" placeholder="내용" value="'+v+'" style="flex:2;padding:4px 6px;"><button class="btn-del" onclick="this.parentNode.remove()" style="padding:4px 8px;">✕</button>';
  item.addEventListener('dragstart',function(e){dragSrcIndex=Array.from(container.children).indexOf(item);e.dataTransfer.effectAllowed='move';});
  item.addEventListener('dragover',function(e){e.preventDefault();item.classList.add('drag-over');});
  item.addEventListener('dragleave',function(){item.classList.remove('drag-over');});
  item.addEventListener('drop',function(e){e.preventDefault();item.classList.remove('drag-over');var ti=Array.from(container.children).indexOf(item);if(dragSrcIndex===null||dragSrcIndex===ti)return;var src=Array.from(container.children)[dragSrcIndex];if(dragSrcIndex<ti)container.insertBefore(src,item.nextSibling);else container.insertBefore(src,item);dragSrcIndex=null;});
  container.appendChild(item);
}

function saveChar(){
  if(!currentChar||!window._isAdmin)return;
  var chars=getChars(),idx=chars.findIndex(function(c){return c.id===currentChar.id;});if(idx<0)return;
  var profile=[];document.querySelectorAll('#ep-profile-rows .profile-drag-item').forEach(function(item){var k=item.querySelector('.prof-key').value.trim(),v=item.querySelector('.prof-val').value;if(k)profile.push({k:k,v:v});});
  var vnLines=[];document.querySelectorAll('.vn-speaker').forEach(function(s,i){var t=document.querySelectorAll('.vn-text')[i];if(t&&t.value.trim())vnLines.push({speaker:s.value,text:t.value.trim()});});
  var isFileTheme = document.getElementById('theme-file-input') && document.getElementById('theme-file-input').style.display==='block';
  var themeFileData = document.getElementById('ep-theme-file-data') ? document.getElementById('ep-theme-file-data').value : '';
  var ytRaw=document.getElementById('ep-theme-yt').value.trim();
  var m=ytRaw.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);var ytId=m?m[1]:ytRaw;
  // collect AU
  var auItems=document.querySelectorAll('#ep-au-list .au-edit-item');
  var auVersions=[];
  auItems.forEach(function(item,i){
    if(i>=epAuData.length)return;
    auVersions.push({label:item.querySelector('.au-label').value,img:item.querySelector('.au-img').value.trim()||epAuData[i].img||'',imgFit:item.querySelector('.au-fit').value,imgPos:item.querySelector('.au-pos').value});
  });
  chars[idx]={id:currentChar.id,name:document.getElementById('ep-name').value,nameSub:document.getElementById('ep-namesub').value,role:document.getElementById('ep-role').value,faction:document.getElementById('ep-faction').value,category:document.getElementById('ep-category').value,subcat:document.getElementById('ep-subcat').value,tag:document.getElementById('ep-tag').value,stars:parseInt(document.getElementById('ep-stars').value)||5,img:document.getElementById('ep-img-data').value.trim(),imgFit:document.getElementById('ep-img-fit').value,imgPos:document.getElementById('ep-img-pos').value,desc:document.getElementById('ep-desc').value,story:document.getElementById('ep-story').value,gallery:epGalleryData,novel:chars[idx].novel||[],vnLines:vnLines,profile:profile,theme:{title:document.getElementById('ep-theme-title').value,artist:document.getElementById('ep-theme-artist').value,youtubeId:isFileTheme?'':ytId,fileData:isFileTheme?themeFileData:''},auVersions:auVersions};
  setChars(chars);currentChar=chars[idx];
  openDetail(currentChar,currentAuIdx);renderGrid();
  var msg=document.getElementById('ep-save-msg');msg.style.display='block';setTimeout(function(){msg.style.display='none';},2000);
}

  function install(){
    var p=document.getElementById('bgm-player');
    if(!p)return;
    var expand=document.getElementById('bgm-expand-btn');
    if(expand&&!expand.dataset.lhDoubleOnly){
      var clone=expand.cloneNode(true);
      clone.dataset.lhDoubleOnly='1';
      clone.style.pointerEvents='none';

      }

      if(!p.classList.contains('collapsed'))return;
