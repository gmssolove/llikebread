<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 如月高校</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0608; --bg2:#110a0d; --bg3:#170d10;
  --red:#8b1a1a; --red-light:#c0392b; --red-dim:#4a0e0e;
  --gold:#9a7d4a;
  --text:#e8ddd5; --text-dim:#9a8a82; --text-muted:#5a4a44;
  --border:rgba(139,26,26,0.25);
}
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-weight:300; min-height:100vh; }

/* LOGIN */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-box { background:var(--bg2); border:1px solid var(--border); padding:2.5rem; width:320px; text-align:center; }
.login-mark { font-family:'Cormorant Garamond',serif; font-size:32px; font-style:italic; color:var(--red-light); margin-bottom:0.5rem; }
.login-title { font-size:12px; letter-spacing:0.2em; color:var(--text-muted); text-transform:uppercase; margin-bottom:2rem; }
.login-box input { width:100%; padding:10px 12px; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:13px; margin-bottom:12px; outline:none; }
.login-box input:focus { border-color:var(--red); }
.btn-primary { width:100%; padding:10px; background:var(--red-dim); border:1px solid var(--red); color:var(--text-dim); font-family:inherit; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
.btn-primary:hover { background:var(--red); color:var(--text); }
.login-error { font-size:11px; color:var(--red-light); margin-top:10px; display:none; }

/* ADMIN */
#admin-screen { display:none; }
header { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; height:52px; gap:1rem; }
.header-title { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:16px; color:var(--gold); flex:1; }
.btn-sm { padding:5px 14px; background:transparent; border:1px solid var(--border); color:var(--text-muted); font-family:inherit; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; text-decoration:none; display:inline-block; }
.btn-sm:hover { border-color:var(--red); color:var(--red-light); }
.btn-danger { border-color:var(--red-dim); color:var(--red-light); }
.btn-danger:hover { background:var(--red-dim); }

.admin-wrap { max-width:900px; margin:0 auto; padding:2rem; }
.admin-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:2rem; }
.admin-tab { padding:10px 20px; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.admin-tab.active { color:var(--red-light); border-bottom-color:var(--red-light); }
.admin-panel { display:none; }
.admin-panel.active { display:block; }

.form-group { margin-bottom:1rem; }
.form-label { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; display:block; }
.form-input { width:100%; padding:9px 12px; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:13px; outline:none; resize:vertical; }
.form-input:focus { border-color:var(--red); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

.card { background:var(--bg2); border:1px solid var(--border); padding:1.25rem; margin-bottom:1rem; }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
.card-title { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); }

.item-list { display:flex; flex-direction:column; gap:8px; margin-top:1rem; }
.item-row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg3); border:1px solid var(--border); }
.item-name { flex:1; font-size:12px; color:var(--text-dim); }
.item-sub { font-size:10px; color:var(--text-muted); margin-top:2px; }

.msg { font-size:11px; padding:8px 12px; margin-top:12px; display:none; }
.msg.success { background:rgba(139,26,26,0.15); border:1px solid var(--red-dim); color:var(--red-light); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-mark">如</div>
    <div class="login-title">Administrator</div>
    <input type="password" id="pw-input" placeholder="비밀번호" />
    <button class="btn-primary" onclick="tryLogin()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 틀렸습니다.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div class="header-title">如月高校 — 관리자</div>
    <a href="index.html" class="btn-sm">← 사이트로 돌아가기</a>
    <button class="btn-sm btn-danger" onclick="logout()">로그아웃</button>
  </header>

  <div class="admin-wrap">
    <div class="admin-tabs">
      <div class="admin-tab active" onclick="switchTab('bgm')">BGM</div>
      <div class="admin-tab" onclick="switchTab('chars')">캐릭터</div>
      <div class="admin-tab" onclick="switchTab('chronicle')">크로니클</div>
      <div class="admin-tab" onclick="switchTab('notice')">공지사항</div>
      <div class="admin-tab" onclick="switchTab('gallery')">갤러리</div>
    </div>

    <!-- BGM -->
    <div class="admin-panel active" id="panel-bgm">
      <div class="card">
        <div class="card-title" style="margin-bottom:1rem;">BGM 설정</div>
        <div class="form-group">
          <label class="form-label">곡 제목</label>
          <input class="form-input" id="bgm-title" placeholder="예: Caterpillar In A Mol For Piano">
        </div>
        <div class="form-group">
          <label class="form-label">아티스트</label>
          <input class="form-input" id="bgm-artist" placeholder="예: Aidan Clare">
        </div>
        <div class="form-group">
          <label class="form-label">유튜브 URL 또는 영상 ID</label>
          <input class="form-input" id="bgm-yt" placeholder="예: https://youtu.be/xxxx 또는 xxxx">
          <div style="font-size:10px;color:var(--text-muted);margin-top:5px;">유튜브 공유 링크를 그대로 붙여넣어도 됩니다.</div>
        </div>
        <button class="btn-primary" style="width:auto;padding:8px 24px;" onclick="saveBgm()">저장</button>
        <div class="msg success" id="bgm-msg">저장되었습니다.</div>
      </div>
    </div>

    <!-- CHARACTERS -->
    <div class="admin-panel" id="panel-chars">
      <div class="card">
        <div class="card-header">
          <div class="card-title">새 캐릭터 추가</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">이름 (한자/일어)</label>
            <input class="form-input" id="char-name" placeholder="예: 遠藤 潤">
          </div>
          <div class="form-group">
            <label class="form-label">역할</label>
            <input class="form-input" id="char-role" placeholder="예: Antagonist">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">태그 (짧게)</label>
            <input class="form-input" id="char-tag" placeholder="예: Uru">
          </div>
          <div class="form-group">
            <label class="form-label">이미지 URL (선택)</label>
            <input class="form-input" id="char-img" placeholder="이미지 링크">
          </div>
        </div>
        <button class="btn-primary" style="width:auto;padding:8px 24px;" onclick="addChar()">추가</button>
        <div class="msg success" id="char-msg">추가되었습니다.</div>
      </div>
      <div class="item-list" id="char-list"></div>
    </div>

    <!-- CHRONICLE -->
    <div class="admin-panel" id="panel-chronicle">
      <div class="card">
        <div class="card-header"><div class="card-title">새 크로니클 추가</div></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">번호 (예: 01)</label>
            <input class="form-input" id="chr-num" placeholder="01">
          </div>
          <div class="form-group">
            <label class="form-label">태그 (예: Prologue)</label>
            <input class="form-input" id="chr-tag" placeholder="Act I">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <input class="form-input" id="chr-text" placeholder="입학. 그리고 첫 번째 실종.">
        </div>
        <button class="btn-primary" style="width:auto;padding:8px 24px;" onclick="addChr()">추가</button>
        <div class="msg success" id="chr-msg">추가되었습니다.</div>
      </div>
      <div class="item-list" id="chr-list"></div>
    </div>

    <!-- NOTICE -->
    <div class="admin-panel" id="panel-notice">
      <div class="card">
        <div class="card-header"><div class="card-title">새 공지 추가</div></div>
        <div class="form-group">
          <label class="form-label">제목</label>
          <input class="form-input" id="ntc-title" placeholder="공지 제목">
        </div>
        <div class="form-group">
          <label class="form-label">날짜</label>
          <input class="form-input" id="ntc-date" placeholder="2025.01.01">
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <textarea class="form-input" id="ntc-content" rows="3" placeholder="공지 내용"></textarea>
        </div>
        <button class="btn-primary" style="width:auto;padding:8px 24px;" onclick="addNotice()">추가</button>
        <div class="msg success" id="ntc-msg">추가되었습니다.</div>
      </div>
      <div class="item-list" id="ntc-list"></div>
    </div>

    <!-- GALLERY -->
    <div class="admin-panel" id="panel-gallery">
      <div class="card">
        <div class="card-header"><div class="card-title">갤러리 이미지 추가</div></div>
        <div class="form-group">
          <label class="form-label">이미지 URL</label>
          <input class="form-input" id="gal-img" placeholder="이미지 링크">
        </div>
        <div class="form-group">
          <label class="form-label">설명 (선택)</label>
          <input class="form-input" id="gal-desc" placeholder="이미지 설명">
        </div>
        <button class="btn-primary" style="width:auto;padding:8px 24px;" onclick="addGallery()">추가</button>
        <div class="msg success" id="gal-msg">추가되었습니다.</div>
      </div>
      <div class="item-list" id="gal-list"></div>
    </div>
  </div>
</div>

<script>
var ADMIN_PW = 'kisaragi2024';

function getData(key, def) {
  try { return JSON.parse(localStorage.getItem('kisaragi_'+key)) || def; } catch(e) { return def; }
}
function setData(key, val) {
  localStorage.setItem('kisaragi_'+key, JSON.stringify(val));
}

function tryLogin() {
  var pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryLogin();
});
function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

function switchTab(name) {
  document.querySelectorAll('.admin-tab').forEach(function(t,i) {
    var names = ['bgm','chars','chronicle','notice','gallery'];
    t.classList.toggle('active', names[i]===name);
  });
  document.querySelectorAll('.admin-panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-'+name).classList.add('active');
}

function showMsg(id) {
  var el = document.getElementById(id);
  el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 2000);
}

function extractYtId(url) {
  url = url.trim();
  var m = url.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[A-Za-z0-9_-]{11}$/.test(url)) return url;
  return url;
}

// BGM
function saveBgm() {
  var d = {
    title: document.getElementById('bgm-title').value,
    artist: document.getElementById('bgm-artist').value,
    youtubeId: extractYtId(document.getElementById('bgm-yt').value)
  };
  setData('bgm', d);
  showMsg('bgm-msg');
}
function loadBgmForm() {
  var d = getData('bgm', {});
  document.getElementById('bgm-title').value = d.title || '';
  document.getElementById('bgm-artist').value = d.artist || '';
  document.getElementById('bgm-yt').value = d.youtubeId || '';
}

// CHARS
var defaultChars = [
  {id:1, nameJp:'遠藤 潤', role:'Antagonist', tag:'Uru', img:''},
  {id:2, nameJp:'遠藤 伊織', role:'Founder', tag:'Iori', img:''},
  {id:3, nameJp:'遠藤 斗哉', role:'Protagonist', tag:'Toya', img:''}
];
function addChar() {
  var name = document.getElementById('char-name').value.trim();
  if (!name) return;
  var chars = getData('characters', defaultChars);
  chars.push({id:Date.now(), nameJp:name, role:document.getElementById('char-role').value, tag:document.getElementById('char-tag').value, img:document.getElementById('char-img').value});
  setData('characters', chars);
  ['char-name','char-role','char-tag','char-img'].forEach(function(id){ document.getElementById(id).value=''; });
  renderCharList(); showMsg('char-msg');
}
function deleteChar(id) {
  var chars = getData('characters', defaultChars).filter(function(c){ return c.id !== id; });
  setData('characters', chars); renderCharList();
}
function renderCharList() {
  var chars = getData('characters', defaultChars);
  var el = document.getElementById('char-list');
  if (!chars.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:12px;">등록된 캐릭터가 없습니다.</div>'; return; }
  el.innerHTML = chars.map(function(c) {
    return '<div class="item-row"><div class="item-name">'+c.nameJp+'<div class="item-sub">'+c.role+(c.tag?' · '+c.tag:'')+'</div></div><button class="btn-sm btn-danger" onclick="deleteChar('+c.id+')">삭제</button></div>';
  }).join('');
}

// CHRONICLE
var defaultChr = [
  {id:1, num:'01', text:'입학. 그리고 첫 번째 실종.', tag:'Prologue'},
  {id:2, num:'02', text:'교칙 제 7조. 일몰 이후 교정을 벗어나지 말 것.', tag:'Act I'},
  {id:3, num:'03', text:'지하 도서관에서 발견된 것.', tag:'Act I'}
];
function addChr() {
  var text = document.getElementById('chr-text').value.trim();
  if (!text) return;
  var list = getData('chronicle', defaultChr);
  list.push({id:Date.now(), num:document.getElementById('chr-num').value||String(list.length+1).padStart(2,'0'), text:text, tag:document.getElementById('chr-tag').value});
  setData('chronicle', list);
  ['chr-num','chr-text','chr-tag'].forEach(function(id){ document.getElementById(id).value=''; });
  renderChrList(); showMsg('chr-msg');
}
function deleteChr(id) {
  var list = getData('chronicle', defaultChr).filter(function(c){ return c.id !== id; });
  setData('chronicle', list); renderChrList();
}
function renderChrList() {
  var list = getData('chronicle', defaultChr);
  var el = document.getElementById('chr-list');
  if (!list.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:12px;">등록된 항목이 없습니다.</div>'; return; }
  el.innerHTML = list.map(function(c) {
    return '<div class="item-row"><div class="item-name">'+c.num+'. '+c.text+'<div class="item-sub">'+c.tag+'</div></div><button class="btn-sm btn-danger" onclick="deleteChr('+c.id+')">삭제</button></div>';
  }).join('');
}

// NOTICE
function addNotice() {
  var title = document.getElementById('ntc-title').value.trim();
  if (!title) return;
  var list = getData('notices', []);
  list.unshift({id:Date.now(), title:title, date:document.getElementById('ntc-date').value, content:document.getElementById('ntc-content').value});
  setData('notices', list);
  ['ntc-title','ntc-date','ntc-content'].forEach(function(id){ document.getElementById(id).value=''; });
  renderNtcList(); showMsg('ntc-msg');
}
function deleteNotice(id) {
  var list = getData('notices', []).filter(function(n){ return n.id !== id; });
  setData('notices', list); renderNtcList();
}
function renderNtcList() {
  var list = getData('notices', []);
  var el = document.getElementById('ntc-list');
  if (!list.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:12px;">등록된 공지가 없습니다.</div>'; return; }
  el.innerHTML = list.map(function(n) {
    return '<div class="item-row"><div class="item-name">'+n.title+'<div class="item-sub">'+n.date+'</div></div><button class="btn-sm btn-danger" onclick="deleteNotice('+n.id+')">삭제</button></div>';
  }).join('');
}

// GALLERY
function addGallery() {
  var img = document.getElementById('gal-img').value.trim();
  if (!img) return;
  var list = getData('gallery', []);
  list.push({id:Date.now(), img:img, desc:document.getElementById('gal-desc').value});
  setData('gallery', list);
  ['gal-img','gal-desc'].forEach(function(id){ document.getElementById(id).value=''; });
  renderGalList(); showMsg('gal-msg');
}
function deleteGallery(id) {
  var list = getData('gallery', []).filter(function(g){ return g.id !== id; });
  setData('gallery', list); renderGalList();
}
function renderGalList() {
  var list = getData('gallery', []);
  var el = document.getElementById('gal-list');
  if (!list.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:12px;">등록된 이미지가 없습니다.</div>'; return; }
  el.innerHTML = list.map(function(g) {
    return '<div class="item-row"><div class="item-name">'+g.img+'<div class="item-sub">'+g.desc+'</div></div><button class="btn-sm btn-danger" onclick="deleteGallery('+g.id+')">삭제</button></div>';
  }).join('');
}

function initAdmin() {
  loadBgmForm();
  renderCharList();
  renderChrList();
  renderNtcList();
  renderGalList();
}
</script>
</body>
</html>
