<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKEHOUSE</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #dbdbdb;
            --point-pink: #f472b6;
            --point-gold: #d4af37;
            --player-bg: #f9f9f9;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* 내비게이션 바 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
        }
        .navbar .logo {
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
        }
        .navbar .menu a {
            margin-left: 20px;
            text-decoration: none;
            color: var(--text-color);
            cursor: pointer;
        }
        .navbar .menu a:hover {
            color: var(--point-pink);
        }

        /* 메인 콘텐츠 영역 (동적 전환) */
        #main-content {
            padding: 40px;
            min-height: calc(100vh - 160px);
        }

        /* 푸터 */
        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            color: #666;
        }

        /* BGM 단일 플레이어 (드래그 가능) */
        #bgm-player {
            position: fixed;
            width: 280px;
            background: var(--player-bg);
            border: 1px solid var(--point-gold);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 9999;
            cursor: move;
            user-select: none;
        }
        .player-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .player-controls button {
            background: var(--point-pink);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .progress-bar {
            flex-grow: 1;
            height: 5px;
            background: #e2e8f0;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: var(--point-gold);
            width: 0%;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- 상단 내비게이션 -->
    <nav class="navbar">
        <div class="logo" onclick="navigate('home')">LAKEHOUSE</div>
        <div class="menu">
            <a onclick="navigate('oc')">OC</a>
            <a onclick="navigate('pair')">Pair</a>
            <a onclick="navigate('trpg')">TRPG</a>
            <a onclick="navigate('admin')">Admin</a>
        </div>
    </nav>

    <!-- 동적 콘텐츠 컨테이너 -->
    <main id="main-content">
        <!-- 기본 홈 화면 내용 -->
        <h2>Welcome to LAKEHOUSE</h2>
        <p>메인 화면 공간입니다.</p>
    </main>

    <!-- 싱크가 유지되는 고정형 단일 BGM 플레이어 -->
    <div id="bgm-player">
        <div class="player-title" id="track-name">선택된 테마곡이 없습니다</div>
        <div class="player-controls">
            <button id="play-btn" onclick="togglePlay()">▶</button>
            <div class="progress-bar" onclick="seekAudio(event)">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
        <!-- 숨겨진 오디오 엘리먼트 (유튜브 및 파일 통합 제어용) -->
        <audio id="main-audio" loop></audio>
    </div>

    <!-- 하단 푸터 -->
    <footer>
        LAKEHOUSE<br>
        © LAKEHOUSE All rights reserved[cite: 1]
    </footer>

    <script>
        // --- 1. 페이지 이동 애니메이션 및 동적 로드 (BGM 유지의 핵심) ---
        function navigate(page) {
            const content = document.getElementById('main-content');
            
            // 실제 프로젝트 환경에 맞게 fetch('pages/' + page + '.html') 형태로 사용하거나, 
            // 우선 테스트 및 통합 관리를 위해 템플릿 컴포넌트 형태로 전환합니다.
            if(page === 'home') {
                content.innerHTML = `<h2>Welcome to LAKEHOUSE</h2><p>메인 화면 공간입니다.</p>`;
            } else if(page === 'oc') {
                content.innerHTML = `<h2>Original Characters</h2><div class="oc-grid" id="oc-list">캐릭터 로딩 중...</div>`;
                loadOCs();
            } else if(page === 'pair') {
                content.innerHTML = `<h2>Pair 관계도</h2><p>페어 매칭 레이아웃 영역입니다.</p>`;
            } else if(page === 'trpg') {
                content.innerHTML = `<h2>TRPG 시나리오</h2><div id="trpg-list">시나리오 로딩 중...</div>`;
                loadTRPG();
            } else if(page === 'admin') {
                content.innerHTML = getAdminTemplate();
                initAdminPage();
            }
        }

        // --- 2. BGM 플레이어 드래그 위치 고정 기억 ---
        const player = document.getElementById('bgm-player');
        let isDragging = false;
        let offsetX, offsetY;

        // 기존 저장된 위치가 있다면 복원
        const savedPos = JSON.parse(localStorage.getItem('playerPos'));
        if (savedPos) {
            player.style.left = savedPos.left + 'px';
            player.style.top = savedPos.top + 'px';
        } else {
            player.style.right = '20px';
            player.style.bottom = '20px';
        }

        player.addEventListener('mousedown', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.classList.contains('progress-bar')) return;
            isDragging = true;
            offsetX = e.clientX - player.getBoundingClientRect().left;
            offsetY = e.clientY - player.getBoundingClientRect().top;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let left = e.clientX - offsetX;
            let top = e.clientY - offsetY;
            player.style.left = left + 'px';
            player.style.top = top + 'px';
            player.style.right = 'auto';
            player.style.bottom = 'auto';
            localStorage.setItem('playerPos', JSON.stringify({left, top}));
        });

        document.addEventListener('mouseup', () => isDragging = false);

        // --- 3. 통합 오디오 플레이어 로직 ---
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const progressFill = document.getElementById('progress-fill');

        function playTheme(title, src) {
            document.getElementById('track-name').innerText = title;
            audio.src = src;
            audio.play();
            playBtn.innerText = '❚❚';
        }

        function togglePlay() {
            if(!audio.src) return;
            if(audio.paused) {
                audio.play();
                playBtn.innerText = '❚❚';
            } else {
                audio.pause();
                playBtn.innerText = '▶';
            }
        }

        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                const pct = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = pct + '%';
            }
        });

        function seekAudio(e) {
            if(!audio.src || !audio.duration) return;
            const bar = e.currentTarget;
            const pct = e.offsetX / bar.offsetWidth;
            audio.currentTime = pct * audio.duration;
        }

        // --- 4. 가짜 데이터 세션 및 undefined 방지 렌더링 예시 ---
        let mockData = JSON.parse(localStorage.getItem('lakehouse_data')) || { ocs: [], trpgs: [] };

        function loadOCs() {
            const list = document.getElementById('oc-list');
            if(mockData.ocs.length === 0) {
                list.innerHTML = '<p>등록된 캐릭터가 없습니다.</p>';
                return;
            }
            // undefined 방지 단락 평가 코드가 심어진 렌더러
            list.innerHTML = mockData.ocs.map(oc => `
                <div style="border: 1px solid var(--border-color); padding:15px; margin-bottom:10px; border-radius:6px;">
                    <h3>${oc.name || '이름 없음'} (${oc.subcat || '일반'})</h3>
                    <p>소속: ${oc.faction || '소속 없음'}</p>
                    <button onclick="playTheme('${oc.name} 테마곡', '${oc.audioSrc || ''}')">🎵 테마곡 재생</button>
                </div>
            `).join('');
        }

        function loadTRPG() {
            const list = document.getElementById('trpg-list');
            if(mockData.trpgs.length === 0) {
                list.innerHTML = '<p>등록된 시나리오가 없습니다.</p>';
                return;
            }
            list.innerHTML = mockData.trpgs.map(t => `
                <div style="border:1px solid var(--border-color); padding:15px; margin-bottom:10px;">
                    <h4>${t.title || '제목 없음'}</h4>
                    <p>날짜: ${t.date || '날짜 미지정'}</p>
                    <p>${t.preview || '내용 요약이 없습니다.'}</p>
                </div>
            `).join('');
        }

        // --- 5. 통합 관리자 템플릿 및 스크립트 (가로폭 제한 + 날짜선택기) ---
        function getAdminTemplate() {
            return `
                <div style="max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border: 1px solid var(--border-color); border-radius: 8px;">
                    <h2 style="border-bottom: 2px solid var(--point-pink); padding-bottom:10px;">LAKEHOUSE 통합 관리자 대시보드</h2>
                    
                    <!-- 탭 메뉴 분리 -->
                    <div style="margin-bottom: 20px; display:flex; gap:10px;">
                        <button onclick="switchAdminTab('tab-oc')" style="padding:10px 20px; cursor:pointer;">OC/페어 설정</button>
                        <button onclick="switchAdminTab('tab-trpg')" style="padding:10px 20px; cursor:pointer;">TRPG 설정</button>
                    </div>

                    <!-- OC 설정 탭 -->
                    <div id="tab-oc" class="admin-tab-content">
                        <h3>캐릭터 및 페어 등록/수정</h3>
                        <form id="oc-form" onsubmit="saveOC(event)" style="display:flex; flex-direction:column; gap:12px;">
                            <label>캐릭터 이름: <input type="text" id="admin-oc-name" required style="width:100%; padding:6px;"></label>
                            <label>서브 카테고리: <input type="text" id="admin-oc-subcat" placeholder="공백일 시 undefined 방지 자동 처리" style="width:100%; padding:6px;"></label>
                            <label>소속 (Faction): <input type="text" id="admin-oc-faction" style="width:100%; padding:6px;"></label>
                            <label>테마 오디오 파일 업로드: <input type="file" id="admin-oc-file" accept="audio/*" style="width:100%; padding:6px;"></label>
                            <button type="submit" style="background:var(--point-pink); color:#fff; border:none; padding:10px; cursor:pointer; font-weight:bold;">캐릭터 저장하기</button>
                        </form>
                    </div>

                    <!-- TRPG 설정 탭 -->
                    <div id="tab-trpg" class="admin-tab-content" style="display:none;">
                        <h3>TRPG 시나리오 세션 등록</h3>
                        <form id="trpg-form" onsubmit="saveTRPG(event)" style="display:flex; flex-direction:column; gap:12px;">
                            <label>시나리오 제목: <input type="text" id="admin-trpg-title" required style="width:100%; padding:6px;"></label>
                            <!-- 기존 텍스트 입력창에서 HTML5 규격 달력(Date Picker)으로 교체 -->
                            <label>플레이 날짜: <input type="date" id="admin-trpg-date" required style="width:100%; padding:6px;"></label>
                            <label>시나리오 요약/소개: <textarea id="admin-trpg-preview" rows="4" style="width:100%; padding:6px;"></textarea></label>
                            <button type="submit" style="background:var(--point-gold); color:#fff; border:none; padding:10px; cursor:pointer; font-weight:bold;">시나리오 저장하기</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function switchAdminTab(tabId) {
            document.querySelectorAll('.admin-tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
        }

        function initAdminPage() {
            // 필요 시 관리자 폼 초기화 코드 작성
        }

        // --- 6. Base64 변환 후 로컬 스토리지에 데이터 영구 저장 로직 ---
        function saveOC(e) {
            e.preventDefault();
            const name = document.getElementById('admin-oc-name').value;
            const subcat = document.getElementById('admin-oc-subcat').value;
            const faction = document.getElementById('admin-oc-faction').value;
            const fileInput = document.getElementById('admin-oc-file');

            const newOC = { name, subcat, faction, audioSrc: '' };

            if(fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    newOC.audioSrc = event.target.result; // 로컬 오디오 Base64 데이터화
                    mockData.ocs.push(newOC);
                    localStorage.setItem('lakehouse_data', JSON.stringify(mockData));
                    alert('오디오 파일이 포함된 캐릭터가 성공적으로 등록되었습니다.');
                    document.getElementById('oc-form').reset();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                mockData.ocs.push(newOC);
                localStorage.setItem('lakehouse_data', JSON.stringify(mockData));
                alert('캐릭터가 등록되었습니다.');
                document.getElementById('oc-form').reset();
            }
        }

        function saveTRPG(e) {
            e.preventDefault();
            const title = document.getElementById('admin-trpg-title').value;
            const date = document.getElementById('admin-trpg-date').value; // YYYY-MM-DD 형태로 깔끔하게 취득
            const preview = document.getElementById('admin-trpg-preview').value;

            mockData.trpgs.push({ title, date, preview });
            localStorage.setItem('lakehouse_data', JSON.stringify(mockData));
            alert('TRPG 시나리오가 성공적으로 등록되었습니다.');
            document.getElementById('trpg-form').reset();
        }
    </script>
</body>
</html>
